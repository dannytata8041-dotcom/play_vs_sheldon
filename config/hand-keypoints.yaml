axelera-model-format: 1.0.0

name: yolo11n-pose-hands

description: >
  YOLO11n-pose fine-tuned for 21 hand keypoints (wrist + 4 per finger).
  Model from https://github.com/chrismuntean/YOLO11n-pose-hands
  Export to ONNX first: python scripts/export_hand_model.py

pipeline:
  - hand_keypoints:
      model_name: yolo11n-pose-hands
      input:
        type: image
      preprocess:
        - letterbox:
            height: 640
            width: 640
            scaleup: true
        - torch-totensor:
      inference:
        handle_all: false
      postprocess:
        - decodehandpose:
            box_format: xywh
            conf_threshold: 0.40
            nms_iou_threshold: 0.45
            max_nms_boxes: 100
            nms_top_k: 300
            normalized_coord: false

models:
  yolo11n-pose-hands:
    class: AxONNXModel
    class_path: $AXELERA_FRAMEWORK/ax_models/base_onnx.py
    weight_path: weights/yolo11n-pose-hands.onnx
    task_category: KeypointDetection
    input_tensor_layout: NCHW
    input_tensor_shape: [1, 3, 640, 640]
    input_color_format: RGB
    num_classes: 1
    dataset: CocoDataset-keypoint-COCO2017
    extra_kwargs:
      compilation_config:
        quantization_scheme: per_tensor_min_max
        ignore_weight_buffers: false

datasets:
  CocoDataset-keypoint-COCO2017:
    class: KptDataAdapter
    class_path: $AXELERA_FRAMEWORK/ax_datasets/objdataadapter.py
    data_dir_name: coco
    label_type: COCO2017

operators:
  decodehandpose:
    class: DecodeHandPose
    class_path: /home/orangepi/Downloads/pov/src/decode_handpose.py
