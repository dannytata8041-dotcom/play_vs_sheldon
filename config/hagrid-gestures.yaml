axelera-model-format: 1.0.0

name: yolov10n-hagrid-gestures

description: >
  YOLOv10n trained on HaGRIDv2 for 34-class hand gesture detection.
  Classes include rock, peace, palm, fist, like, ok, point, etc.

pipeline:
  - gesture_detections:
      model_name: yolov10n-hagrid-gestures
      input:
        type: image
      preprocess:
        - letterbox:
            height: 640
            width: 640
            scaleup: true
        - torch-totensor:
      inference:
        handle_all: false
      postprocess:
        - decodeyolo10:
            box_format: xyxy
            conf_threshold: 0.25
            normalized_coord: false
            top_k: 300
            use_multi_label: false

models:
  yolov10n-hagrid-gestures:
    class: AxONNXModel
    class_path: $AXELERA_FRAMEWORK/ax_models/base_onnx.py
    weight_path: weights/yolov10n-hagrid-gestures.onnx
    task_category: ObjectDetection
    input_tensor_layout: NCHW
    input_tensor_shape: [1, 3, 640, 640]
    input_color_format: RGB
    num_classes: 34
    dataset: HaGRID-gestures
    extra_kwargs:
      compilation_config:
        quantization_scheme: per_tensor_min_max
        ignore_weight_buffers: false

datasets:
  HaGRID-gestures:
    class: ObjDataAdapter
    class_path: $AXELERA_FRAMEWORK/ax_datasets/objdataadapter.py
    data_dir_name: coco
    labels_path: /home/orangepi/Downloads/pov/config/hagrid.names
    label_type: COCO2017

operators:
  decodeyolo10:
    class: DecodeYolo10
    class_path: $AXELERA_FRAMEWORK/ax_models/decoders/yolo10.py
